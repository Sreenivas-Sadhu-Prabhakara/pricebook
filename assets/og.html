<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg:    #F4F1E9;
    --bg2:   #ECE7DB;
    --card:  #FFFFFF;
    --ink:   #17251C;
    --ink2:  #3C4B40;
    --muted: #55635A;
    --line:  #D5CEBE;
    --line2: #C2BAA6;
    --pine:  #1D6B45;
    --pine-deep: #124A2F;
    --tag:   #B85C10;
    --best:  #147A46;
    --best-dim: #DFF0E4;
    --tag-dim:  #F6E7D4;
    --pine-dim: #E1EFE6;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      linear-gradient(180deg, var(--pine-dim) 0%, transparent 46%),
      var(--bg);
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* shelf-tag weave signature */
  .weave { position: absolute; inset: 0; width: 1200px; height: 630px; opacity: 0.5; }
  .weave path { fill: none; stroke: var(--line2); stroke-width: 1.3; }
  .weave circle { fill: none; stroke: var(--line2); stroke-width: 1.3; opacity: 0.6; }

  .frame {
    position: absolute; inset: 0;
    padding: 82px 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  .brand { display: flex; align-items: center; gap: 20px; color: var(--pine); }
  .mark {
    width: 74px; height: 74px; border-radius: 18px;
    background: var(--card); border: 1px solid var(--line);
    box-shadow: 0 14px 34px -20px rgba(23,37,28,0.4);
    display: grid; place-items: center;
  }
  .mark svg { width: 46px; height: 46px; }
  .wordmark { font-size: 62px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; color: var(--ink); }

  .headline { max-width: 940px; }
  .headline h1 {
    font-size: 62px; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1.08; color: var(--ink);
  }
  .headline .real { color: var(--tag); }
  .headline p {
    margin-top: 22px;
    font-size: 29px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--ink2); line-height: 1.35; max-width: 32ch;
  }

  /* mini price-tag comparison, the "aha" */
  .demo { display: flex; align-items: stretch; gap: 16px; }
  .pt {
    border: 1px solid var(--line2); border-radius: 14px; background: var(--card);
    padding: 16px 22px; display: flex; flex-direction: column; gap: 3px;
    box-shadow: 0 6px 18px -14px rgba(23,37,28,0.5);
  }
  .pt.best { border-color: var(--best); box-shadow: 0 0 0 1px var(--best); background: var(--best-dim); }
  .pt__pack { font-family: var(--mono); font-size: 22px; color: var(--muted); }
  .pt__unit { font-family: var(--mono); font-size: 30px; font-weight: 700; color: var(--pine-deep); }
  .pt.best .pt__unit { color: var(--best); }
  .pt__badge {
    align-self: flex-start; margin-top: 4px;
    font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em;
    color: #F4FBF6; background: var(--best); border-radius: 999px; padding: 3px 11px;
  }

  .chips { display: flex; align-items: center; gap: 12px; }
  .chip {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 11px 19px; border: 1px solid var(--line2); border-radius: 999px;
    background: var(--card); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink2);
  }
  .chip .dot { width: 11px; height: 11px; border-radius: 50%; }
  .chip .dot--green { background: var(--pine); }
  .chip .dot--tag { background: var(--tag); }
</style>
</head>
<body>
  <svg class="weave" viewBox="0 0 1200 630" preserveAspectRatio="none" aria-hidden="true">
    <path d="M40 90 L124 90 L124 132 L40 132 L26 111 Z"/><circle cx="50" cy="111" r="4"/>
    <path d="M204 90 L288 90 L288 132 L204 132 L190 111 Z"/><circle cx="214" cy="111" r="4"/>
    <path d="M368 90 L452 90 L452 132 L368 132 L354 111 Z"/><circle cx="378" cy="111" r="4"/>
    <path d="M980 90 L1064 90 L1064 132 L980 132 L966 111 Z"/><circle cx="990" cy="111" r="4"/>
    <path d="M1144 90 L1228 90 L1228 132 L1144 132 L1130 111 Z"/><circle cx="1154" cy="111" r="4"/>
    <path d="M122 186 L206 186 L206 228 L122 228 L108 207 Z"/><circle cx="132" cy="207" r="4"/>
    <path d="M286 186 L370 186 L370 228 L286 228 L272 207 Z"/><circle cx="296" cy="207" r="4"/>
    <path d="M1062 186 L1146 186 L1146 228 L1062 228 L1048 207 Z"/><circle cx="1072" cy="207" r="4"/>
    <path d="M40 282 L124 282 L124 324 L40 324 L26 303 Z"/><circle cx="50" cy="303" r="4"/>
    <path d="M1144 282 L1228 282 L1228 324 L1144 324 L1130 303 Z"/><circle cx="1154" cy="303" r="4"/>
  </svg>

  <div class="frame">
    <div class="brand">
      <span class="mark">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16 5v3" stroke="#1D6B45" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 9h18" stroke="#1D6B45" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 9l-3.5 7h7z" fill="none" stroke="#1D6B45" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M25 9l-3.5 7h7z" fill="none" stroke="#B85C10" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M12 25h8" stroke="#1D6B45" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 9v16" stroke="#1D6B45" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="wordmark">pricebook</span>
    </div>

    <div class="headline">
      <h1>Know the <span class="real">real</span> cheapest&nbsp;—<br>by unit price.</h1>
      <p>The big pack isn&rsquo;t always the deal. It does the g&harr;kg &amp; ml&harr;L math for you.</p>
    </div>

    <div class="demo">
      <div class="pt">
        <span class="pt__pack">500 g · ₹100</span>
        <span class="pt__unit">₹20.00 /100 g</span>
      </div>
      <div class="pt best">
        <span class="pt__pack">1 kg · ₹180</span>
        <span class="pt__unit">₹18.00 /100 g</span>
        <span class="pt__badge">best value</span>
      </div>
      <div class="chips" style="margin-left:auto; align-items:flex-end; flex-direction:column; gap:12px;">
        <span class="chip"><span class="dot dot--green"></span>price log</span>
        <span class="chip"><span class="dot dot--tag"></span>offline</span>
      </div>
    </div>
  </div>
</body>
</html>
