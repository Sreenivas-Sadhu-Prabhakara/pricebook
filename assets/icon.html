<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #F4F1E9; }
  body { display: grid; place-items: center; }
  /* 12% safe padding on each side -> mark fills the middle 76vmin */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <path d="M16 5.5v3.2" stroke="#1D6B45" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M6.5 9h19" stroke="#1D6B45" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M6.5 9l-3.6 7.2h7.2z" fill="none" stroke="#1D6B45" stroke-width="2.1" stroke-linejoin="round"/>
    <path d="M25.5 9l-3.6 7.2h7.2z" fill="none" stroke="#B85C10" stroke-width="2.1" stroke-linejoin="round"/>
    <path d="M11.5 25.5h9" stroke="#1D6B45" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M16 9v16.5" stroke="#1D6B45" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
</body>
</html>
